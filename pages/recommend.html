<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>추천 도서 — 동양미래대학교 도서관</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=IBM+Plex+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="../css/style.css">
        <style>
            .page-hero { background: var(--blue-dk); padding: 2.5rem 2rem; }
            .page-hero-inner { max-width: 1280px; margin: 0 auto; }
            .page-hero-title { font-size: 1.6rem; font-weight: 700; color: white; letter-spacing: -0.5px; margin-bottom: .35rem; }
            .page-hero-bc { font-size: 12.5px; color: rgba(255,255,255,.45); display: flex; align-items: center; gap: 6px; }
            .page-hero-bc a { color: rgba(255,255,255,.45); transition: color .2s; }
            .page-hero-bc a:hover { color: rgba(255,255,255,.8); }
            .page-content { max-width: 1280px; margin: 0 auto; padding: 2.5rem 2rem; }
            /* 금주 피처드 */
            .week-featured {
                display: grid; grid-template-columns: 160px 1fr;
                gap: 2rem; padding: 1.75rem;
                background: var(--bg); border-left: 3px solid var(--blue);
                margin-bottom: 2rem;
            }
            .wf-cover { width:100%; aspect-ratio:2/3; box-shadow:3px 5px 16px rgba(0,0,0,.18); overflow:hidden; background:#1a5aa8; }
            .wf-cover img { width:100%; height:100%; object-fit:cover; }
            .wf-cover-ph { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:13px; text-align:center; padding:10px; color:rgba(255,255,255,.88); font-weight:600; line-height:1.4; }
            .wf-rank   { font-size:12px; font-weight:700; color:var(--blue); letter-spacing:.3px; margin-bottom:.5rem; }
            .wf-title  { font-size:1.45rem; font-weight:700; color:var(--text); letter-spacing:-.4px; margin-bottom:.25rem; }
            .wf-author { font-size:13.5px; color:var(--text3); margin-bottom:.9rem; }
            .wf-tags   { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:1rem; }
            .wf-tag    { font-size:11px; padding:3px 9px; border:1px solid var(--blue-bd); color:var(--blue); background:var(--blue-lt); }
            .wf-desc   { font-size:13.5px; color:var(--text2); line-height:1.8; margin-bottom:1.25rem; letter-spacing:-.1px; }
            .wf-foot   { display:flex; align-items:center; gap:1rem; }
            .avail     { display:flex; align-items:center; gap:5px; font-size:13px; color:#107840; font-weight:600; }
            .avail-dot { width:6px; height:6px; background:#2db665; }
            /* 6열 그리드 */
            .books-grid-6 { display:grid; grid-template-columns:repeat(6,1fr); gap:1.25rem; }
            /* 장르 필터 */
            .genre-filter { display:flex; flex-wrap:wrap; gap:6px; margin:1rem 0 1.5rem; }
            .gtab { padding:5px 14px; border:1px solid var(--border); background:white; color:var(--text2); font-size:13.5px; font-weight:500; transition:all .15s; letter-spacing:-0.2px; cursor:pointer; font-family:inherit; }
            .gtab.on { background:var(--blue-dk); border-color:var(--blue-dk); color:white; }
            .gtab:hover:not(.on) { border-color:var(--blue); color:var(--blue); }
            /* 사서 추천 */
            .curator-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1.5rem; margin-top:1.25rem; }
            .curator-card { border:1px solid var(--border); padding:1.5rem; }
            .curator-card-top { display:flex; gap:1rem; margin-bottom:1rem; }
            .curator-cover { width:72px; height:104px; flex-shrink:0; object-fit:cover; background:var(--bg2); box-shadow:2px 3px 8px rgba(0,0,0,.14); }
            .curator-cover-ph { width:72px; height:104px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:10px; text-align:center; padding:6px; font-weight:700; color:rgba(255,255,255,.88); line-height:1.4; box-shadow:2px 3px 8px rgba(0,0,0,.14); }
            .curator-title  { font-size:14.5px; font-weight:700; color:var(--text); margin-bottom:3px; letter-spacing:-.2px; }
            .curator-author { font-size:12px; color:var(--text3); margin-bottom:.5rem; }
            .curator-by     { font-size:11px; color:var(--blue); font-weight:600; }
            .curator-desc   { font-size:13px; color:var(--text2); line-height:1.75; letter-spacing:-.1px; }
            /* 베스트 순위 */
            .best-list { margin-top:1.25rem; }
            .best-row { display:flex; align-items:center; gap:1rem; padding:.85rem 0; border-bottom:1px solid #e8e8e8; cursor:pointer; transition:background .12s; }
            .best-row:first-child { border-top:2px solid var(--text); }
            .best-row:hover { background:var(--bg); }
            .best-rank { width:32px; flex-shrink:0; font-size:18px; font-weight:700; color:var(--blue-dk); text-align:center; }
            .best-rank.top3 { color:#c00; }
            .best-cover-sm-ph { width:44px; height:62px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:8px; text-align:center; padding:4px; font-weight:700; color:rgba(255,255,255,.88); line-height:1.3; box-shadow:1px 2px 6px rgba(0,0,0,.14); }
            .best-info { flex:1; min-width:0; }
            .best-title  { font-size:14px; font-weight:600; color:var(--text); letter-spacing:-.2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:3px; }
            .best-author { font-size:12px; color:var(--text3); }
            .best-avail  { font-size:11.5px; color:#107840; font-weight:600; flex-shrink:0; }
        </style>
    </head>
    <body>
        <div id="header-placeholder">
        </div>
        <div class="page-hero">
            <div class="page-hero-inner">
                <div class="page-hero-title">추천 도서</div>
                <div class="page-hero-bc">
                    <a href="../index.html">홈</a>
                    <span>&rsaquo;</span>
                    <span>추천 도서</span>
                </div>
            </div>
        </div>
        <div class="page-content">
            <div class="tab-row" id="recTabs">
                <button class="tab-btn on"  data-key="week">금주의 추천 도서</button>
                <button class="tab-btn" data-key="genre">장르별 추천</button>
                <button class="tab-btn" data-key="curator">사서 추천 도서</button>
                <button class="tab-btn" data-key="best">베스트 대출</button>
            </div>
            <!-- 금주의 추천 -->
            <div id="tab-week">
                <div class="sec-hd">
                    <span class="sec-title">이번 주 추천 도서</span>
                </div>
                <div class="week-featured">
                    <div class="wf-cover">
                        <div class="wf-cover-ph" id="wf-main" style="background:#163d73">도둑맞은 집중력</div>
                    </div>
                    <div id="wf-info">
                    </div>
                </div>
                <div class="sec-hd">
                    <span class="sec-title" style="font-size:1.1rem;">이번 주 추천 더보기</span>
                </div>
                <div class="books-grid-6" id="weekGrid">
                </div>
            </div>
            <!-- 장르별 추천 -->
            <div id="tab-genre" style="display:none;">
                <div class="genre-filter" id="genreTabs">
                    <button class="gtab on" data-g="all">전체</button>
                    <button class="gtab" data-g="novel">소설 · 문학</button>
                    <button class="gtab" data-g="self">자기계발</button>
                    <button class="gtab" data-g="biz">경영 · 경제</button>
                    <button class="gtab" data-g="sci">과학 · 기술</button>
                    <button class="gtab" data-g="art">예술 · 디자인</button>
                    <button class="gtab" data-g="hist">역사 · 인문</button>
                    <button class="gtab" data-g="it">IT · 공학</button>
                </div>
                <div class="books-grid-6" id="genreGrid">
                </div>
            </div>
            <!-- 사서 추천 -->
            <div id="tab-curator" style="display:none;">
                <div class="sec-hd">
                    <span class="sec-title">사서 추천 도서</span>
                </div>
                <div class="curator-grid" id="curatorGrid">
                </div>
            </div>
            <!-- 베스트 대출 -->
            <div id="tab-best" style="display:none;">
                <div class="sec-hd">
                    <span class="sec-title">베스트 대출 Top 10</span>
                </div>
                <div class="best-list" id="bestList">
                </div>
            </div>
        </div>
        <div id="footer-placeholder">
        </div>
        <script src="../js/main.js">

        </script>
        <script src="../js/books.js">

        </script>
        <script>
            renderHeader('추천 도서');
            renderFooter();
            /* ── 메인 탭 전환 ── */
            const PANELS = { week:'tab-week', genre:'tab-genre', curator:'tab-curator', best:'tab-best' };
            document.querySelectorAll('#recTabs .tab-btn').forEach(btn =>
                btn.addEventListener('click', () => {
                        document.querySelectorAll('#recTabs .tab-btn').forEach(x => x.classList.remove('on'));
                        btn.classList.add('on');
                        Object.values(PANELS).forEach(id => document.getElementById(id).style.display = 'none');
                        document.getElementById(PANELS[btn.dataset.key]).style.display = 'block';
                })
            );
            /* ── hash 자동 탭 이동 ── */
            (function() {
                    const hash = location.hash.replace('#', '');
                    if (hash && PANELS[hash]) {
                        const btn = document.querySelector(`#recTabs .tab-btn[data-key="${hash}"]`);
                        if (btn) btn.click();
                    }
            })();
            /* ── 금주 #1 피처드 ── */
            (function() {
                    const b = ALL_BOOKS['week_1'];
                    renderBookCover(document.getElementById('wf-main'), 'week_1');
                    document.getElementById('wf-info').innerHTML = `
                    <div class="wf-rank">이번 주 #1</div>
                    <div class="wf-title">${b.t}</div>
                    <div class="wf-author">${b.a}</div>
                    <div class="wf-tags">${(b.tags||[]).map(t=>`<span class="wf-tag">${t}</span>`).join('')}</div>
                    <p class="wf-desc">${b.desc||''}</p>
                    <div class="wf-foot">
                    <div class="avail"><div class="avail-dot"></div>대출 가능</div>
                    <button class="btn-primary">대출 예약</button>
                    <button class="btn-outline">상세 정보</button>
                    </div>`;
            })();
            /* ── 금주 #2~7 그리드 ── */
            const WEEK_EXTRA = ['week_2','week_3','week_4','week_5','week_6','best_7'];
            (function() {
                    const grid = document.getElementById('weekGrid');
                    grid.innerHTML = WEEK_EXTRA.map((k,i) => bookCardHTML(ALL_BOOKS[k], `wk2-${i}`)).join('');
                    WEEK_EXTRA.forEach((k,i) => renderBookCover(document.getElementById(`wk2-${i}`), k));
            })();
            /* ── 장르별 ── */
            const GENRE_KEYS = {
                all:   ['g_novel_1','g_biz_1',  'g_it_1',   'g_sci_1',  'g_hist_1', 'g_novel_2'],
                novel: ['g_novel_1','g_novel_2','g_novel_3', 'g_novel_4','g_novel_5','g_novel_6'],
                self:  ['g_self_1', 'g_self_2', 'g_self_3',  'g_self_4', 'g_self_5', 'g_self_6'],
                biz:   ['g_biz_1',  'g_biz_2',  'g_biz_3',   'g_biz_4',  'g_biz_5',  'g_biz_6'],
                sci:   ['g_sci_1',  'g_sci_2',  'g_sci_3',   'g_sci_4',  'g_sci_5',  'g_sci_6'],
                art:   ['g_art_1',  'g_art_2',  'g_art_3',   'g_art_4',  'g_art_5',  'g_art_6'],
                hist:  ['g_hist_1', 'g_hist_2', 'g_hist_3',  'g_hist_4', 'g_hist_5', 'g_hist_6'],
                it:    ['g_it_1',   'g_it_2',   'g_it_3',    'g_it_4',   'g_it_5',   'g_it_6'],
            };
            function renderGenre(key) {
                const grid = document.getElementById('genreGrid');
                const keys = GENRE_KEYS[key] || GENRE_KEYS.all;
                grid.innerHTML = keys.map((k,i) => gbookCardHTML(ALL_BOOKS[k], `gk-${key}-${i}`)).join('');
                keys.forEach((k,i) => renderBookCover(document.getElementById(`gk-${key}-${i}`), k));
            }
            document.querySelectorAll('#genreTabs .gtab').forEach(btn =>
                btn.addEventListener('click', () => {
                        document.querySelectorAll('#genreTabs .gtab').forEach(x => x.classList.remove('on'));
                        btn.classList.add('on'); renderGenre(btn.dataset.g);
                })
            );
            renderGenre('all');
            /* ── 사서 추천 ── */
            (function() {
                    const keys = ['cur_1','cur_2','cur_3'];
                    const grid = document.getElementById('curatorGrid');
                    grid.innerHTML = keys.map((k,i) => {
                            const b = ALL_BOOKS[k];
                            return `
                            <div class="curator-card">
                            <div class="curator-card-top">
                            <div class="curator-cover-ph" id="cur-${i}" style="background:${b.bg}">${b.t}</div>
                            <div>
                            <div class="curator-title">${b.t}</div>
                            <div class="curator-author">${b.a}</div>
                            <div class="curator-by">추천: ${b.by||''}</div>
                            </div>
                            </div>
                            <p class="curator-desc">${b.curDesc||''}</p>
                            </div>`;
                    }).join('');
            keys.forEach((k,i) => renderBookCover(document.getElementById(`cur-${i}`), k));
            })();
            /* ── 베스트 대출 Top 10 ── */
            (function() {
                    const keys = ['best_1','best_2','best_3','best_4','best_5','best_6','best_7','best_8','best_9','best_10'];
                    const list = document.getElementById('bestList');
                    list.innerHTML = keys.map((k,i) => {
                            const b = ALL_BOOKS[k];
                            return `
                            <div class="best-row">
                            <div class="best-rank ${i<3?'top3':''}">${i+1}</div>
                            <div class="best-cover-sm-ph" id="bs-${i}" style="background:${b.bg}">${b.t}</div>
                            <div class="best-info">
                            <div class="best-title">${b.t}</div>
                            <div class="best-author">${b.a}</div>
                            </div>
                            <div class="best-avail">대출 가능</div>
                            <button class="btn-primary" style="font-size:12.5px;padding:6px 14px;">대출 예약</button>
                            </div>`;
                    }).join('');
            keys.forEach((k,i) => renderBookCover(document.getElementById(`bs-${i}`), k));
            })();
        </script>
    </body>
</html>
