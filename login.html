<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동양미래대학교 도서관 - 로그인</title>
    <style>
        /* 기본 여백 초기화 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #f9fbfd; /* 깔끔하고 부드러운 배경색 */
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* 1. 상단 헤더 스타일 (메인 화면의 여백과 높이를 재현) */
        .header {
            background-color: white;
            padding: 15px 50px; 
            border-bottom: 1px solid #eaeaea;
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }

        /* 두 이미지를 가로로 나란히 정렬하는 상자 */
        .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 12px; /* 마크와 이름 이미지 사이의 간격 */
        }

        /* 왼쪽 마크 이미지 크기 */
        .dmu-mark {
            height: 40px; 
            width: auto;
        }

        /* 오른쪽 학교 이름 이미지 크기 */
        .dmu-name {
            height: 32px; /* 마크 크기와 밸런스가 맞게 살짝 조절 */
            width: auto;
        }

        /* 2. 로그인 영역 중앙 정렬 컨테이너 */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 로그인 박스 디자인 */
        .login-container {
            background-color: white;
            padding: 40px 35px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 360px;
        }

        .login-container h2 {
            font-size: 22px;
            color: #333;
            margin-bottom: 25px;
            text-align: center;
            font-weight: bold;
        }

        /* 입력창 디자인 */
        .input-group {
            margin-bottom: 15px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .input-group input:focus {
            border-color: #004c99;
            outline: none;
        }

        /* 로그인 유지 & 비밀번호 찾기 정렬 */
        .options-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 13px;
        }

        .options-bar label {
            color: #666;
            cursor: pointer;
        }

        .options-bar a {
            color: #004c99;
            text-decoration: none;
        }

        .options-bar a:hover {
            text-decoration: underline;
        }

        /* 로그인 버튼 (동양미래대 블루 컬러) */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #004c99; 
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-submit:hover {
            background-color: #003366;
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-wrapper">
            <img src="images/dmu-logo1.jpg" alt="동양미래대학교 마크" class="dmu-mark">
            <img src="images/dmu-10gp2.jpg" alt="동양미래대학교 이름" class="dmu-name">
        </div>
    </header>

    <main class="main-content">
        <div class="login-container">
            <h2>도서관 로그인</h2>
            
            <form action="#" method="POST">
                <div class="input-group">
                    <input type="text" name="username" placeholder="학번 또는 사번" required>
                </div>
                
                <div class="input-group">
                    <input type="password" name="password" placeholder="비밀번호" required>
                </div>
                
                <div class="options-bar">
                    <div>
                        <input type="checkbox" id="remember-me" name="remember">
                        <label for="remember-me">로그인 유지</label>
                    </div>
                    <a href="#">비밀번호 찾기</a>
                </div>
                
                <button type="submit" class="btn-submit">로그인</button>
            </form>
        </div>
    </main>

</body>
</html>
