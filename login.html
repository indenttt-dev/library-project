<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동양미래대학교 도서관 - 로그인</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #f9fbfd; 
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            background-color: white;
            padding: 15px 50px; 
            border-bottom: 1px solid #eaeaea;
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }

        .dmu-logo {
            height: 40px; 
            width: auto;
        }

        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background-color: white;
            padding: 40px 35px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 360px;
        }

        .login-container h2 {
            font-size: 22px;
            color: #333;
            margin-bottom: 25px;
            text-align: center;
            font-weight: bold;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .input-group input:focus {
            border-color: #004c99;
            outline: none;
        }

        .options-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 13px;
        }

        .options-bar label {
            color: #666;
            cursor: pointer;
        }

        .options-bar a {
            color: #004c99;
            text-decoration: none;
        }

        .options-bar a:hover {
            text-decoration: underline;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #004c99; 
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-submit:hover {
            background-color: #003366;
        }
    </style>
</head>
<body>

    <header class="header">
        <img src="images/logo.jpg" alt="동양미래대학교 로고" class="dmu-logo">
    </header>

    <main class="main-content">
        <div class="login-container">
            <h2>도서관 로그인</h2>
            
            <form action="#" method="POST">
                <div class="input-group">
                    <input type="text" name="username" placeholder="학번 또는 사번" required>
                </div>
                
                <div class="input-group">
                    <input type="password" name="password" placeholder="비밀번호" required>
                </div>
                
                <div class="options-bar">
                    <div>
                        <input type="checkbox" id="remember-me" name="remember">
                        <label for="remember-me">로그인 유지</label>
                    </div>
                    <a href="#">비밀번호 찾기</a>
                </div>
                
                <button type="submit" class="btn-submit">로그인</button>
            </form>
        </div>
    </main>

</body>
</html>
